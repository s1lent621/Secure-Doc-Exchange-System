<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Secure Legal Document Exchange System — Encrypted document sharing with PKI digital signatures for law firms.">
  <title>SecureDoc — Legal Document Exchange</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
</head>
<body>

  <!-- Toast Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Mobile Menu Button -->
  <button class="mobile-menu-btn" onclick="document.getElementById('sidebar').classList.toggle('open')">☰</button>

  <!-- ===== AUTH SECTION ===== -->
  <div id="authSection" class="hidden">
    <div class="auth-container">

      <!-- Login Form -->
      <div id="loginForm" class="auth-card">
        <div class="auth-logo">
          <div class="logo-icon">🔐</div>
          <h1>SecureDoc Exchange</h1>
          <p>Encrypted legal document sharing platform</p>
        </div>
        <form onsubmit="app.handleLogin(event)">
          <div class="form-group">
            <label>Username</label>
            <input type="text" class="form-control" id="loginUsername" placeholder="Enter your username" required autocomplete="username">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" id="loginPassword" placeholder="Enter your password" required autocomplete="current-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block">🔓 Sign In</button>
        </form>
        <div class="auth-switch">
          Don't have an account? <a href="#" onclick="app.showRegister()">Create one</a>
        </div>
      </div>

      <!-- Register Form -->
      <div id="registerForm" class="auth-card hidden">
        <div class="auth-logo">
          <div class="logo-icon">🔐</div>
          <h1>Create Account</h1>
          <p>A secure RSA-2048 key pair will be generated for you</p>
        </div>
        <form onsubmit="app.handleRegister(event)">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" class="form-control" id="regFullName" placeholder="John Doe" required>
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>Username</label>
              <input type="text" class="form-control" id="regUsername" placeholder="johndoe" required autocomplete="username">
            </div>
            <div class="form-group">
              <label>Role</label>
              <select class="form-control" id="regRole">
                <option value="client">Client</option>
                <option value="lawyer">Lawyer</option>
                <option value="admin">Admin</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" class="form-control" id="regEmail" placeholder="john@lawfirm.com" required autocomplete="email">
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" class="form-control" id="regPassword" placeholder="Create a strong password" required minlength="6" autocomplete="new-password">
          </div>
          <button type="submit" class="btn btn-primary btn-block">🔐 Create Secure Account</button>
        </form>
        <div class="auth-switch">
          Already have an account? <a href="#" onclick="app.showLogin()">Sign in</a>
        </div>
      </div>

    </div>
  </div>

  <!-- ===== APP SECTION ===== -->
  <div id="appSection" class="hidden">
    <div class="app-layout">
      <aside class="sidebar" id="sidebar"></aside>
      <main class="main-content" id="mainContent"></main>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
